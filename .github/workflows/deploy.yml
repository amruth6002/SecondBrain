name: Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write    # needed to push to GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/amruth6002/secondbrain:latest
            ghcr.io/amruth6002/secondbrain:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Ping Azure webhook to trigger a pull of the new image
      - name: Trigger Azure deployment
        if: env.AZURE_WEBAPP_WEBHOOK != ''
        env:
          AZURE_WEBAPP_WEBHOOK: ${{ secrets.AZURE_WEBAPP_WEBHOOK }}
        run: |
          curl -s -X POST "$AZURE_WEBAPP_WEBHOOK" \
            -H "Content-Length: 0" \
            --max-time 30 || echo "Webhook ping sent (response may be delayed)"
